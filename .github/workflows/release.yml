name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset: proxy-linux-amd64
          - goos: linux
            goarch: arm64
            asset: proxy-linux-arm64
          - goos: darwin
            goarch: amd64
            asset: proxy-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset: proxy-darwin-arm64
          - goos: windows
            goarch: amd64
            asset: proxy-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Build
        working-directory: go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o ../dist/${{ matrix.asset }} ./cmd/proxy

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute checksums
        working-directory: dist
        run: sha256sum * > checksums.txt && cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: HttpOverVercel ${{ github.ref_name }}
          body: |
            ## Download

            | Platform | File |
            |---|---|
            | Linux x64 | `proxy-linux-amd64` |
            | Linux ARM64 | `proxy-linux-arm64` |
            | macOS Intel | `proxy-darwin-amd64` |
            | macOS Apple Silicon | `proxy-darwin-arm64` |
            | Windows x64 | `proxy-windows-amd64.exe` |

            ### Quick start
            1. Download the binary for your platform
            2. `cp config.example.json config.json` and fill in `worker_host` and `auth_key`
            3. Run: `./proxy -c config.json`
            4. Install the CA cert: `./proxy --install-cert`
            5. Set your browser proxy to `127.0.0.1:8085`
          files: |
            dist/*
          draft: false
          prerelease: false
